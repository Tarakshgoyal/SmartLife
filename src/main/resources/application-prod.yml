# Production profile — overrides application.yml
# Secrets injected via environment variables or a secrets manager (e.g. AWS SSM, Vault)

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate   # NEVER use 'update' in prod — use Flyway/Liquibase migrations

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

    elasticsearch:
      uris: ${ES_URI}

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRY_MS:86400000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}

smartlife:
  storage:
    upload-dir: ${UPLOAD_DIR:/data/uploads}
  ocr:
    tessdata-path: ${TESSDATA_PATH:/usr/share/tessdata}
  ml:
    models-dir: ${ML_MODELS_DIR:/data/ml-models}

server:
  port: ${PORT:8080}
  tomcat:
    threads:
      max: 200
      min-spare: 20

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.smartlife: INFO
    org.springframework: WARN
    org.hibernate: WARN
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n"
